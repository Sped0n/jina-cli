name: Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --locked --dev

      - name: Run tests
        env:
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: |
          set -euo pipefail
          : "${JINA_API_KEY:?Repository secret JINA_API_KEY is required}"
          uv run pytest -v --tb=short
